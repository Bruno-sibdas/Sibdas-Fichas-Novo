<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEP Ginásio</title>

    <link rel="shortcut icon" href="../../includes/img/gym125.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../includes/fontawesome/all.min.css">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/app.css">
    
</head>

<body>
    <header class="container-fluid bg-dark text-white">
        <div class="row align-items-center">
            <div class="col-6 d-flex align-items-center p-3">
                <a href="../../index.html">
                    <img alt="Logo do ISEP Ginásio" height="40" src="../../includes/img/gym125_white.png" class="me-3">
                </a>
                <h3 class="mb-0">ISEP Ginásio</h3>
            </div>

            <div class="col-6 text-end p-3">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fa-regular fa-user me-2"></i> Utilizador
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fa-solid fa-key me-2"></i>Alterar password</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="../../login_form.html"><i class="fa-solid fa-right-from-bracket me-2"></i>Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">

            <aside class="col-md-3 col-lg-2 bg-secondary text-white p-3 min-vh-100">
                <h4>Menu</h4>
                <nav>
                    <a href="lista.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-users me-2"></i> Clientes
                    </a>
                    <a href="../agendamento/agendamento.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-calendar-alt me-2"></i> Agendamento de treinos
                    </a>
                    <a href="../planos/planos_treino.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-dumbbell me-2"></i> Planos de Treino
                    </a>
                    <a href="../equipamentos/equipamentos.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-cogs me-2"></i> Equipamentos
                    </a>
                    <a href="../produtos-servicos/produtos_servicos.html" class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-box-open me-2"></i> Produtos e Serviços
                    </a>
                </nav>
            </aside>

            <main class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-center mt-4">
                    <div class="card w-100 shadow rounded" style="max-width: 1200px;">
                        <div class="card-body">

                            <h2 class="mb-4">
                                <strong><i class="fa-solid fa-pen-to-square me-2"></i> Atualização de Dados CLIENTES</strong>
                            </h2>
                            <hr>

                            <form action="#" method="post" novalidate>

                                <div class="mb-3">
                                    <label for="texto_nome" class="form-label">Nome Completo</label>
                                    <input type="text" name="nome_cliente" id="texto_nome" value="João Silva" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="texto_endereco" class="form-label">Morada <small>(NºPorta, Andar)</small></label>
                                    <input type="text" name="morada_cliente" id="texto_endereco" value="Rua das Flores, nº12, 2º Esq." class="form-control">
                                </div>

                                <div class="mb-3">
                                    <label for="texto_cp" class="form-label">Código Postal</label>
                                    <input type="text" name="cp_cliente" id="texto_cp" value="4000-123" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="texto_cidade" class="form-label">Cidade</label>
                                    <input type="text" name="cid_cliente" id="texto_cidade" value="Porto" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="texto_cliente" class="form-label">Telefone</label>
                                    <input type="text" name="tel_cliente" id="texto_cliente" value="912345678" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="texto_email" class="form-label">Email</label>
                                    <input type="email" name="email_cliente" id="texto_email" value="joao.silva@email.pt" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Sexo</label><br>
                                    <input type="radio" name="radio_gender" id="radio_m" value="m" checked>
                                    <label for="radio_m">Masculino</label>

                                    <input type="radio" name="radio_gender" id="radio_f" value="f" class="ms-3">
                                    <label for="radio_f">Feminino</label>
                                </div>

                                <div class="mb-3">
                                    <label for="texto_dnasc" class="form-label">Data de nascimento</label>
                                    <input type="text" name="dnasc_cliente" id="texto_dnasc" value="1985-07-20" class="form-control" disabled>
                                </div>

                                <div class="mb-3">
                                    <label for="texto_estcivil" class="form-label">Estado Civil</label>
                                    <select name="estaciv_cliente" id="texto_estcivil" class="form-select">
                                        <option>Escolha uma opção</option>
                                        <option value="solt">Solteiro</option>
                                        <option value="casd" selected>Casado</option>
                                        <option value="ufat">União de Facto</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="texto_SSaude" class="form-label">Sistema de Saúde</label>
                                    <input type="text" name="campo_opcao" id="texto_SSaude" value="ADSE" list="sistemasaude" class="form-control">
                                    <datalist id="sistemasaude">
                                        <option value="SNS">
                                        <option value="ADSE">
                                        <option value="SMAS">
                                        <option value="CTT">
                                        <option value="PSP">
                                    </datalist>
                                </div>

                                <div class="d-flex justify-content-end gap-2 mb-4 mt-4">
                                    <a href="lista.html" class="btn btn-outline-secondary">
                                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fa-regular fa-floppy-disk me-1"></i> Guardar
                                    </button>
                                </div>

                                <div class="alert alert-danger text-center" role="alert">
                                    Erro simples
                                </div>

                            </form>
                        </div>
                    </div>
                </div>
            </main>

        </div>
    </div>

    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
